<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Syncarr - Discovery</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        servarrBg: '#1e1e1e',
                        servarrCard: '#252525',
                        servarrBorder: '#333333',
                        servarrCyan: '#38A169', /* adjusted from true cyan for visibility */
                        servarrYellow: '#ECC94B',
                        servarrPink: '#D53F8C',
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #1e1e1e;
            color: #e2e8f0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
    </style>
</head>
<body class="flex h-screen overflow-hidden">

    <!-- Sidebar -->
    <aside class="w-64 bg-servarrCard border-r border-servarrBorder flex flex-col hidden md:flex">
        <div class="h-16 flex items-center justify-center border-b border-servarrBorder">
            <h1 class="text-xl font-bold tracking-wider">SYNCARR</h1>
        </div>
        <nav class="flex-1 px-4 py-6 space-y-2">
            <a href="#" class="flex items-center space-x-3 px-3 py-2 bg-servarrBg rounded-md text-white font-medium">
                <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                <span>Discovery</span>
            </a>
            <a href="#" class="flex items-center space-x-3 px-3 py-2 hover:bg-servarrBg rounded-md text-gray-400 font-medium transition">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                <span>Settings</span>
            </a>
        </nav>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col overflow-hidden">
        <!-- Header -->
        <header class="h-16 flex items-center px-6 border-b border-servarrBorder bg-servarrBg">
            <h2 class="text-lg font-semibold text-gray-200">System Discovery</h2>
            <button onclick="discoverApps()" class="ml-auto bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-md font-medium transition text-sm flex items-center">
                <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                Scan Now
            </button>
        </header>

        <!-- Content Area -->
        <div class="flex-1 overflow-y-auto p-6">
            <div id="loading" class="hidden text-center py-10 text-gray-400">
                <svg class="animate-spin h-8 w-8 mx-auto mb-4 text-blue-500" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
                Scanning for applications...
            </div>

            <div id="error" class="hidden bg-red-900/50 border border-red-500 text-red-200 px-4 py-3 rounded-md mb-6"></div>

            <div id="resultsGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                <!-- Cards will be injected here -->
            </div>

            <div id="emptyState" class="text-center py-20 text-gray-500">
                <svg class="w-16 h-16 mx-auto mb-4 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 002-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path></svg>
                <p class="text-lg">No applications discovered yet.</p>
                <p class="text-sm mt-1">Click "Scan Now" to search the configured directory.</p>
            </div>
        </div>
    </main>

    <script>
        const getAppColor = (appName) => {
            const lowerName = appName.toLowerCase();
            if (lowerName.includes('sonarr')) return 'bg-cyan-500';
            if (lowerName.includes('radarr')) return 'bg-yellow-500';
            if (lowerName.includes('lidarr')) return 'bg-green-500';
            if (lowerName.includes('readarr')) return 'bg-red-500';
            if (lowerName.includes('prowlarr')) return 'bg-blue-500';
            if (lowerName.includes('overseerr')) return 'bg-purple-500';
            return 'bg-gray-500';
        };

        const renderCard = (appData) => {
            const accentColor = getAppColor(appData.app);
            const urlBaseDisplay = appData.urlBase ? appData.urlBase : '/';

            return `
                <div class="bg-servarrCard rounded-lg shadow-lg border border-servarrBorder overflow-hidden flex flex-col transition hover:border-gray-600">
                    <div class="h-1 ${accentColor} w-full"></div>
                    <div class="p-5 flex-1">
                        <div class="flex items-center justify-between mb-4">
                            <h3 class="text-xl font-bold text-white">${appData.app}</h3>
                            <span class="px-2.5 py-1 bg-gray-800 text-xs font-medium rounded text-gray-300 border border-gray-700">Port ${appData.port}</span>
                        </div>

                        <div class="space-y-3">
                            <div>
                                <label class="text-xs text-gray-500 uppercase font-semibold tracking-wider">API Key</label>
                                <div class="mt-1 flex items-center bg-gray-900 rounded border border-gray-700 p-2">
                                    <code class="text-sm text-gray-300 font-mono truncate flex-1">${appData.apiKey || 'Not found'}</code>
                                </div>
                            </div>

                            <div class="flex items-center justify-between">
                                <div>
                                    <label class="text-xs text-gray-500 uppercase font-semibold tracking-wider">URL Base</label>
                                    <p class="text-sm text-gray-300 mt-0.5 font-mono">${urlBaseDisplay}</p>
                                </div>
                                <div>
                                    <label class="text-xs text-gray-500 uppercase font-semibold tracking-wider">Config Path</label>
                                    <p class="text-xs text-gray-400 mt-0.5 truncate max-w-[120px]" title="${appData.path}">.../${appData.path.split('/').pop()}</p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        };

        async function discoverApps() {
            const loading = document.getElementById('loading');
            const error = document.getElementById('error');
            const resultsGrid = document.getElementById('resultsGrid');
            const emptyState = document.getElementById('emptyState');

            loading.classList.remove('hidden');
            error.classList.add('hidden');
            resultsGrid.innerHTML = '';
            emptyState.classList.add('hidden');

            try {
                const response = await fetch('/api/discover');
                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.detail || 'Failed to scan configurations.');
                }

                if (data.data && data.data.length > 0) {
                    const cardsHtml = data.data.map(app => renderCard(app)).join('');
                    resultsGrid.innerHTML = cardsHtml;
                } else {
                    emptyState.classList.remove('hidden');
                    emptyState.innerHTML = '<p class="text-lg text-gray-400">Scan completed. No config.xml files found.</p>';
                }
            } catch (err) {
                error.textContent = err.message;
                error.classList.remove('hidden');
                emptyState.classList.remove('hidden');
            } finally {
                loading.classList.add('hidden');
            }
        }

        // Initial scan on load
        document.addEventListener('DOMContentLoaded', discoverApps);
    </script>
</body>
</html>
